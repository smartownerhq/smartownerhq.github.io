<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartOwner HQ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0f26; color: #f0f0f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 640px; padding: 48px 24px; text-align: center; }
    .logo { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; color: #00e5b5; margin-bottom: 32px; }
    h1 { font-size: 42px; font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
    p { font-size: 18px; color: #9090a0; line-height: 1.7; margin-bottom: 32px; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 48px; }
    .links a { padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; }
    .primary { background: #00e5b5; color: #0a0f26; }
    .secondary { border: 1px solid #333; color: #f0f0f0; }
    .email { font-size: 14px; color: #555; }
    .email a { color: #555; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">SmartOwner HQ</div>
    <h1>AI tools for small business owners</h1>
    <p>We help small business owners use AI to save time, cut costs, and grow faster — no tech background needed.</p>
    <div class="links">
      <a class="primary" href="https://instagram.com/smartownerhq" target="_blank">Instagram</a>
      <a class="secondary" href="https://linkedin.com/company/smartownerhq" target="_blank">LinkedIn</a>
    </div>
    <div class="email"><a href="mailto:smartownerhq@gmail.com">smartownerhq@gmail.com</a></div>
  </div>
</body>
</html>
